# Local PostgreSQL with pgvector for development / CI.
# Usage:
#   docker compose up -d
#   docker compose exec postgres psql -U postgres -d tender_db -f - < src/database/schema.sql
# Or: PGPASSWORD=postgres psql -h localhost -U postgres -d tender_db -f src/database/schema.sql
#
# Set in tender/.env:
#   DATABASE_URL=postgresql://postgres:postgres@localhost:5432/tender_db

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tender-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tender_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tender_db"]
      interval: 5s
      timeout: 5s
      retries: 10
